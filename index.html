<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- These meta tags tell the iPhone to treat this as a native full-screen app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My App">
    
    <!-- CHANGE THIS LINK TO YOUR ICON FILE NAME -->
    <link rel="apple-touch-icon" href="my_icon.png">
    
    <title>PIN Entry</title>
    <!-- We use Tailwind CSS to perfectly match the layout and colors -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force Apple's native system font for authenticity */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f171e; /* Deep Navy Background */
            color: white;
            user-select: none; /* Prevents text highlighting on tap */
            -webkit-tap-highlight-color: transparent; /* Removes blue tap flash on iOS */
        }
        
        /* The bouncing animation when the wrong/right PIN is entered */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<!-- Using 100dvh ensures it fits perfectly regardless of mobile browser toolbars -->
<body class="h-[100dvh] w-screen overflow-hidden flex flex-col items-center">

    <!-- THE PIN ENTRY SCREEN -->
    <div id="pin-screen" class="w-full max-w-md h-full flex flex-col px-6 py-8 sm:py-12 relative transition-opacity duration-300">
        
        <!-- Header: Log out, Lock Icon, Forgot PIN -->
        <header class="flex justify-between items-center w-full">
            <button class="bg-[#1c2632] hover:bg-[#263342] text-white text-sm font-medium py-2 px-4 rounded-full transition">
                Log out
            </button>
            
            <!-- SVG Lock Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>

            <button class="bg-[#1c2632] hover:bg-[#263342] text-white text-sm font-medium py-2 px-4 rounded-full transition">
                Forgot PIN
            </button>
        </header>

        <!-- Main Text and PIN Dots (mb-auto pushes the keypad down) -->
        <main class="flex flex-col items-center mt-10 sm:mt-16 mb-auto">
            <h1 class="text-[clamp(20px,5vw,22px)] font-semibold text-center leading-relaxed">
                Enter personal account 
                <span class="bg-[#f0514e] text-white px-1.5 py-0.5 rounded-md ml-1">PIN</span>
            </h1>
            <p class="text-[#8e9aa5] text-[17px] mt-2">Unlock Monzo app</p>

            <!-- The 4 Hollow Circles - Increased top margin to separate from text -->
            <div id="pin-dots" class="flex gap-5 mt-10 sm:mt-14">
                <div class="pin-dot w-[18px] h-[18px] rounded-full border-2 border-white transition-colors duration-150"></div>
                <div class="pin-dot w-[18px] h-[18px] rounded-full border-2 border-white transition-colors duration-150"></div>
                <div class="pin-dot w-[18px] h-[18px] rounded-full border-2 border-white transition-colors duration-150"></div>
                <div class="pin-dot w-[18px] h-[18px] rounded-full border-2 border-white transition-colors duration-150"></div>
            </div>
        </main>

        <!-- The Number Pad Grid (mt-8 guarantees it stays away from dots on tiny screens) -->
        <div class="flex flex-col items-center w-full mb-6 sm:mb-8 mt-8">
            <!-- place-items-center automatically centers all buttons, gap-x-6 scales better -->
            <div class="grid grid-cols-3 gap-x-6 gap-y-3 sm:gap-y-4 w-full max-w-[320px] place-items-center">
                
                <!-- Buttons 1-9: Using clamp() makes them resize perfectly based on the screen width! -->
                <button onclick="pressKey('1')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">1</button>
                <button onclick="pressKey('2')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">2</button>
                <button onclick="pressKey('3')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">3</button>
                
                <button onclick="pressKey('4')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">4</button>
                <button onclick="pressKey('5')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">5</button>
                <button onclick="pressKey('6')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">6</button>
                
                <button onclick="pressKey('7')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">7</button>
                <button onclick="pressKey('8')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">8</button>
                <button onclick="pressKey('9')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">9</button>
                
                <!-- Bottom Row (Empty, 0, Backspace) -->
                <div></div>
                <button onclick="pressKey('0')" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full bg-[#222e3a] active:bg-[#344454] flex items-center justify-center text-[clamp(28px,7vw,32px)] font-light transition-colors">0</button>
                
                <!-- Backspace/Delete key -->
                <button onclick="deleteKey()" class="w-[clamp(65px,18vw,80px)] h-[clamp(65px,18vw,80px)] rounded-full flex items-center justify-center text-white/50 active:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Footer: Touch ID Button -->
        <button class="w-full bg-[#17232f] hover:bg-[#1f2e3d] active:bg-[#1a2836] rounded-2xl flex items-center justify-between p-4 mb-2 transition-colors">
            <div class="flex items-center gap-4">
                <!-- Cyan Fingerprint SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#25a8e0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"></path>
                    <path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"></path>
                    <path d="M8.21 13.89c-.16-.31-.21-.66-.21-1.02 0-2.21 1.79-4 4-4s4 1.79 4 4c0 .41-.07.8-.19 1.17"></path>
                    <path d="M11 16c-1.66 0-3-1.34-3-3s1.34-3 3-3"></path>
                    <path d="M12 22v-4"></path>
                </svg>
                <span class="text-[17px]">Try Touch ID again</span>
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a6875" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <!-- THE DUMMY LOGGED-IN SCREEN (Hidden by default) -->
    <div id="success-screen" class="hidden w-full h-full flex flex-col items-center justify-center bg-[#E5F904] text-black">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-6">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <h1 class="text-3xl font-bold mb-2">Authenticated!</h1>
        <p class="text-gray-700 mb-8">Your dummy PIN was accepted.</p>
        <button onclick="logout()" class="bg-black text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg active:scale-95 transition-transform">
            Lock App Again
        </button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        let currentPin = "";
        const dots = document.querySelectorAll('.pin-dot');
        const pinScreen = document.getElementById('pin-screen');
        const successScreen = document.getElementById('success-screen');

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    // Fill the circle with white
                    dot.classList.add('bg-white');
                } else {
                    // Empty the circle
                    dot.classList.remove('bg-white');
                }
            });
        }

        function pressKey(num) {
            // Prevent entering more than 4 digits
            if (currentPin.length >= 4) return;

            currentPin += num;
            updateDots();

            // If we hit 4 digits, log in immediately
            if (currentPin.length === 4) {
                // Add a tiny delay so the user sees the 4th dot fill up before screen changes
                setTimeout(() => {
                    pinScreen.classList.add('hidden');
                    successScreen.classList.remove('hidden');
                    
                    // Reset the PIN in the background for when they log out
                    currentPin = "";
                    updateDots();
                }, 150); 
            }
        }

        function deleteKey() {
            if (currentPin.length > 0) {
                currentPin = currentPin.slice(0, -1);
                updateDots();
            }
        }

        function logout() {
            successScreen.classList.add('hidden');
            pinScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
